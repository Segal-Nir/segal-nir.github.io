name: Add 3/6 Material Link

on:
  schedule:
    - cron: '0 15 6 3 *'  # 10:00 AM EST (UTC-5), March 6

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update 3/6 entry
        run: |
          sed -i 's|<li>3/6 - </li>|<li>3/6 - <a href="https://github.com/Segal-Nir/segal-nir.github.io/raw/main/101_materials/March_6_101_DSection.pdf" download>Handout</a></li>|' index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "Add 3/6 handout link"
          git push
